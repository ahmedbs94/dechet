name: tri_dechet
description: A new Flutter project for Eco-Friendly waste management.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  google_fonts: ^6.1.0
  cupertino_icons: ^1.0.2
  flutter_animate: ^4.5.0
  font_awesome_flutter: 10.7.0
  lottie: ^3.1.2
  flutter_svg: ^2.0.10+1
  url_launcher: ^6.2.1
  qr_flutter: ^4.1.0
  timeago: ^3.6.1
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  fl_chart: ^0.68.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/lottie/
